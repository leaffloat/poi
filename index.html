<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社会关系配置 - 辈分版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid #eee;
            overflow-x: auto;
        }
        
        .tab {
            flex: 1;
            min-width: 80px;
            padding: 14px 16px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 14px;
            color: #666;
            transition: all 0.3s;
            white-space: nowrap;
        }
        
        .tab:hover {
            background: #f5f5f5;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            font-weight: 600;
        }
        
        .content {
            padding: 24px;
        }
        
        .panel {
            display: none;
        }
        
        .panel.active {
            display: block;
        }
        
        .section {
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        
        label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
        }
        
        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-danger {
            background: #ff4757;
            color: white;
        }
        
        .btn-danger:hover {
            background: #ff3344;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .person-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }
        
        .person-card h3 {
            font-size: 15px;
            margin-bottom: 12px;
            color: #333;
        }
        
        .relation-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 8px;
        }
        
        /* 查询面板 */
        .query-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .query-result {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            border: 1px solid #e0e0e0;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-label {
            color: #666;
        }
        
        .result-value {
            font-weight: 600;
            color: #333;
        }
        
        /* 关系选择器 */
        .relation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin: 16px 0;
        }
        
        .relation-btn {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .relation-btn:hover {
            border-color: #667eea;
        }
        
        .relation-btn.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        /* 表格 */
        .table-wrapper {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            
            .content {
                padding: 16px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .btn-group .btn {
                width: 100%;
            }
        }
        
        /* 提示 */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast.show {
            opacity: 1;
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .modal-footer {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>社会关系配置</h1>
            <p>辈分称呼查询系统 <span id="headerUser" style="opacity:0.7;font-size:12px;"></span></p>
        </div>
        
        <div class="tabs">
            <button class="tab active" data-tab="personal">个人信息</button>
            <button class="tab" data-tab="relations">辈分完善</button>
            <button class="tab" data-tab="query">辈分查询</button>
        </div>
        
        <div class="content">
            <!-- 个人信息面板 -->
            <div class="panel active" id="personal">
                <div class="section">
                    <h2 class="section-title">基本信息（必填）</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>名字</label>
                            <input type="text" id="myName" placeholder="真实姓名">
                        </div>
                        <div class="form-group">
                            <label>性别</label>
                            <select id="myGender">
                                <option value="">请选择</option>
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>城市</label>
                        <input type="text" id="myCity" placeholder="所在城市">
                    </div>
                </div>
                
                <div class="section">
                    <h2 class="section-title">附加信息（可选）</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>圈子代称</label>
                            <input type="text" id="myNickname" placeholder="圈子里叫什么">
                        </div>
                        <div class="form-group">
                            <label>网络称呼</label>
                            <input type="text" id="myNetName" placeholder="网名/昵称">
                        </div>
                    </div>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="savePersonal()">保存信息</button>
                </div>
            </div>
            
            <!-- 辈分完善面板 -->
            <div class="panel" id="relations">
                <div class="section">
                    <h2 class="section-title">完善你的辈分</h2>
                    <p style="font-size:13px;color:#999;margin-bottom:16px;">填写辅助信息，帮助系统更准确地计算辈分</p>
                    <div id="relationList"></div>
                    <button class="btn btn-secondary" onclick="addRelationEntry()" style="width:100%;margin-top:8px;">+ 添加关系人</button>
                </div>
                <div class="btn-group" style="margin-top:12px;">
                    <button class="btn btn-primary" onclick="saveRelations()">保存关系人</button>
                </div>
            </div>
            
            <!-- 辈分查询面板 -->
            <div class="panel" id="query">
                <div class="query-section">
                    <h3 style="margin-bottom: 12px;">输入对方名字查询</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <input type="text" id="queryName" placeholder="输入名字查询关系">
                        </div>
                        <button class="btn btn-primary" onclick="queryByName()" style="height: 42px; min-width: 80px;">查询</button>
                    </div>
                </div>
                
                <div class="query-result" id="queryResult">
                    <p style="color: #999; text-align: center;">输入名字开始查询</p>
                </div>
            </div>
            

        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        // 数据存储
        let appData = {
            personal: {},
            relations: {},
            children: []
        };
        
        // 当前用户名
        let currentUserName = localStorage.getItem('poi_currentUser') || '';
        
        // 称呼数据
        const relationTitles = {
            // 长辈
            'father': { title: '父亲', call: '爸爸', gender: '男' },
            'mother': { title: '母亲', call: '妈妈', gender: '女' },
            'grandfather_paternal': { title: '祖父', call: '爷爷', gender: '男' },
            'grandmother_paternal': { title: '祖母', call: '奶奶', gender: '女' },
            'grandfather_maternal': { title: '外祖父', call: '外公/姥爷', gender: '男' },
            'grandmother_maternal': { title: '外祖母', call: '外婆/姥姥', gender: '女' },
            'uncle_paternal_older': { title: '伯父', call: '伯伯', gender: '男' },
            'uncle_paternal_younger': { title: '叔父', call: '叔叔', gender: '男' },
            'aunt_paternal': { title: '姑母', call: '姑姑', gender: '女' },
            'uncle_maternal': { title: '舅父', call: '舅舅', gender: '男' },
            'aunt_maternal': { title: '姨母', call: '姨妈', gender: '女' },
            // 平辈
            'spouse': { title: '配偶', maleCall: '老婆', femaleCall: '老公', gender: 'any' },
            'older_brother': { title: '哥哥', call: '哥哥', gender: '男' },
            'younger_brother': { title: '弟弟', call: '弟弟', gender: '男' },
            'older_sister': { title: '姐姐', call: '姐姐', gender: '女' },
            'younger_sister': { title: '妹妹', call: '妹妹', gender: '女' },
            // 晚辈
            'son': { title: '儿子', call: '儿子', gender: '男' },
            'daughter': { title: '女儿', call: '女儿', gender: '女' },
            'grandson': { title: '孙子', call: '孙子', gender: '男' },
            'granddaughter': { title: '孙女', call: '孙女', gender: '女' },
            'nephew_brother': { title: '侄子', call: '侄子', gender: '男' },
            'niece_brother': { title: '侄女', call: '侄女', gender: '女' },
            'nephew_sister': { title: '外甥', call: '外甥', gender: '男' },
            'niece_sister': { title: '外甥女', call: '外甥女', gender: '女' }
        };
        
        // 关系查询用
        const queryRelations = {
            '父亲': { key: 'father', call: '爸爸' },
            '母亲': { key: 'mother', call: '妈妈' },
            '祖父': { key: 'grandfather_paternal', call: '爷爷' },
            '祖母': { key: 'grandmother_paternal', call: '奶奶' },
            '外公': { key: 'grandfather_maternal', call: '外公' },
            '外婆': { key: 'grandmother_maternal', call: '外婆' },
            '伯伯': { key: 'uncle_paternal_older', call: '伯伯' },
            '叔叔': { key: 'uncle_paternal_younger', call: '叔叔' },
            '姑姑': { key: 'aunt_paternal', call: '姑姑' },
            '舅舅': { key: 'uncle_maternal', call: '舅舅' },
            '姨妈': { key: 'aunt_maternal', call: '姨妈' },
            '配偶': { key: 'spouse', call: '老公/老婆' },
            '哥哥': { key: 'older_brother', call: '哥哥' },
            '弟弟': { key: 'younger_brother', call: '弟弟' },
            '姐姐': { key: 'older_sister', call: '姐姐' },
            '妹妹': { key: 'younger_sister', call: '妹妹' },
            '儿子': { key: 'son', call: '儿子' },
            '女儿': { key: 'daughter', call: '女儿' },
            '孙子': { key: 'grandson', call: '孙子' },
            '孙女': { key: 'granddaughter', call: '孙女' },
            '侄子': { key: 'nephew_brother', call: '侄子' },
            '侄女': { key: 'niece_brother', call: '侄女' },
            '外甥': { key: 'nephew_sister', call: '外甥' },
            '外甥女': { key: 'niece_sister', call: '外甥女' }
        };
        
        // 关系映射表（关系key -> 输出信息）
        const relationOutput = {
            'father': { relation: '父子关系', callHim: '爸爸', callMeMale: '儿子', callMeFemale: '女儿' },
            'mother': { relation: '母子关系', callHim: '妈妈', callMeMale: '儿子', callMeFemale: '女儿' },
            'grandfather_paternal': { relation: '祖孙关系', callHim: '爷爷', callMeMale: '孙子', callMeFemale: '孙女' },
            'grandmother_paternal': { relation: '祖孙关系', callHim: '奶奶', callMeMale: '孙子', callMeFemale: '孙女' },
            'grandfather_maternal': { relation: '祖孙关系', callHim: '外公', callMeMale: '外孙', callMeFemale: '外孙女' },
            'grandmother_maternal': { relation: '祖孙关系', callHim: '外婆', callMeMale: '外孙', callMeFemale: '外孙女' },
            'spouse_male': { relation: '夫妻关系', callHim: '老公', callMeMale: '老婆', callMeFemale: '老公' },
            'spouse_female': { relation: '夫妻关系', callHim: '老婆', callMeMale: '老婆', callMeFemale: '老公' },
            'child_male': { relation: '父子关系', callHim: '儿子', callMeMale: '爸爸', callMeFemale: '妈妈' },
            'child_female': { relation: '母女关系', callHim: '女儿', callMeMale: '爸爸', callMeFemale: '妈妈' }
        };
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initTabs();
            if (currentUserName) {
                // 已有用户，自动加载
                selectUser(currentUserName);
            } else {
                // 新用户，选择身份
                showLoginScreen();
            }
        });
        
        // 标签页切换
        function initTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.tab).classList.add('active');
                });
            });
        }
        
        // 更新已完成（关系人网格已移除）
        function updatePersonGrid() {}
        
        // 特殊规则（彩蛋）- 动态生成
        function getSpecialRules() {
            const g = (appData.personal && appData.personal.gender) || '男';
            return {
                '叶飘': {
                    relation: '义父义母的亲兄弟',
                    callHim: '义伯/义叔',
                    callMe: '义侄',
                    chain: ['叶飘', '→ 义父/义母的亲兄弟', '→ 你（义侄）'],
                    note: '这是隐藏规则：叶飘是你义父义母的亲兄弟'
                },
                '冬贝利': {
                    relation: '祖孙关系',
                    callHim: '爷爷',
                    callMe: g === '男' ? '孙子' : '孙女',
                    chain: ['冬贝利', '→ 爷爷', '→ 你'],
                    note: '隐藏规则：冬贝利是你的爷爷'
                },
                '陈睿': {
                    relation: '叔侄关系',
                    callHim: '叔叔',
                    callMe: g === '男' ? '侄子' : '侄女',
                    chain: ['陈睿', '→ 叔叔（所有人的叔叔）', '→ 你'],
                    note: '隐藏规则：陈睿是所有人的叔叔'
                }
            };
        }
        
        // 默认平辈规则 - 动态生成
        function getDefaultPeerRule() {
            const g = (appData.personal && appData.personal.gender) || '男';
            return {
                relation: '平辈关系',
                callHim: g === '男' ? '兄弟/姐妹' : '姐妹/兄弟',
                callMe: g === '男' ? '兄弟/姐妹' : '姐妹/兄弟',
                chain: ['对方', '→ 叔叔是陈睿', '→ 陈睿也是你叔叔', '→ 所以你们是平辈'],
                note: '因为对方的叔叔是陈睿，陈睿也是你叔叔，所以你们是平辈'
            };
        }
        
        // 按名字查询
        async function queryByName() {
            const name = document.getElementById('queryName').value.trim();
            if (!name) {
                showToast('请输入名字');
                return;
            }
            
            // 先检查特殊规则
            const specialRules = getSpecialRules();
            if (specialRules[name]) {
                showQueryResult({ name, ...specialRules[name], isSpecial: true });
                return;
            }
            
            // 查找匹配的关系人
            const rels = appData.relations;
            let found = null;
            if (Array.isArray(rels)) {
                const match = rels.find(r => r && r.name === name);
                if (match) found = { name: match.name, relation: match.relation };
            } else if (typeof rels === 'object' && rels) {
                const match = Object.values(rels).find(r => r && r.name === name);
                if (match) found = { name: match.name, relation: match.relation || '' };
            }
            
            if (found && found.relation) {
                const mapped = queryRelations[found.relation];
                if (mapped) {
                    const out = relationOutput[mapped.key];
                    if (out) {
                        const myGender = appData.personal.gender || '男';
                        showQueryResult({
                            name: found.name,
                            relation: out.relation,
                            callHim: out.callHim,
                            callMe: myGender === '男' ? out.callMeMale : out.callMeFemale
                        });
                        return;
                    }
                }
                // 自定义关系，直接显示
                showQueryResult({
                    name: found.name,
                    relation: found.relation,
                    callHim: found.relation,
                    callMe: appData.personal.name || '我'
                });
                return;
            }
            
            // 查找是否是其他注册用户
            if (allUsersCache[name]) {
                const otherData = await loadOtherUserData(name);
                if (otherData) {
                    const otherPersonal = otherData.personal || {};
                    const otherGender = otherPersonal.gender || '未知';
                    showQueryResult({
                        name: name,
                        callHim: name,
                        callMe: currentUserName,
                        relation: `${name} 的资料`,
                        chain: [`${otherGender === '男' ? '👦' : otherGender === '女' ? '👧' : '👤'} ${name}（${otherGender}）`, `→ 城市：${otherPersonal.city || '未知'}`, `→ 代称：${otherPersonal.nickname || '无'}`],
                        note: `${name} 是注册用户`,
                        isCrossUser: true
                    });
                    return;
                }
            }
            
            // 未找到
            const defaultRule = getDefaultPeerRule();
            showQueryResult({ name, ...defaultRule, isDefault: true });
        }
        
        // 查询指定关系人
        function queryPerson(p) {
            showQueryResult(p);
        }
        
        // 显示查询结果
        function showQueryResult(person) {
            const resultDiv = document.getElementById('queryResult');
            const myGender = appData.personal.gender || '男';
            const myName = appData.personal.name || '我';
            const queryName = person.name || '未知';
            const pGender = person.gender || '未知';
            
            let relationType = '';
            let callHim = '';
            let callMe = '';
            let chain = person.chain || null;
            let note = person.note || '';
            let isSpecial = person.isSpecial || false;
            let isDefault = person.isDefault || false;
            let isCrossUser = person.isCrossUser || false;
            
            // 特殊规则/跨用户/默认规则，直接用预设值
            if (person.callHim && person.callMe) {
                relationType = person.relation;
                callHim = person.callHim;
                callMe = person.callMe;
            } else {
                // 通用关系人显示
                relationType = '亲属关系';
                callHim = queryName;
                callMe = myName;
                const genderIcon = pGender === '男' ? '👦' : pGender === '女' ? '👧' : '👤';
                chain = [`${genderIcon} ${queryName}（${pGender}）`, `→ ${myName}（${myGender}）`];
                note = '这是你配置的关系人';
            }
            
            const personName = person.name || appData.relations[person.key]?.name || '未知';
            
            // 构建特殊规则标签
            let specialTag = '';
            if (isSpecial) {
                specialTag = '<span style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 8px;">✨ 隐藏规则</span>';
            } else if (isDefault) {
                specialTag = '<span style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 8px;">🔗 默认平辈</span>';
            }
            
            // 构建关系链条HTML
            let chainHtml = '';
            if (chain && chain.length > 0) {
                const chainItems = chain.map((item, i) => {
                    if (item.startsWith('→')) {
                        return `<div style="display:flex;align-items:center;color:#764ba2;font-weight:500;">${item}</div>`;
                    } else {
                        return `<div style="display:flex;align-items:center;color:#333;font-weight:600;">${item}</div>`;
                    }
                }).join('');
                
                chainHtml = `
                    <div class="result-item" style="flex-direction: column; align-items: stretch;">
                        <span class="result-label" style="margin-bottom: 8px;">📎 关系链条</span>
                        <div style="background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); padding: 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 6px;">
                            ${chainItems}
                        </div>
                    </div>
                `;
            }
            
            // 构建备注
            let noteHtml = '';
            if (note) {
                noteHtml = `
                    <div class="result-item" style="background: #fff8e1;">
                        <span class="result-label">💡 说明</span>
                        <span class="result-value" style="color: #f57c00;">${note}</span>
                    </div>
                `;
            }
            
            resultDiv.innerHTML = `
                <div class="result-item">
                    <span class="result-label">姓名</span>
                    <span class="result-value">${personName} ${specialTag}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">关系类型</span>
                    <span class="result-value" style="color: #667eea;">${relationType}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">我该叫他/她</span>
                    <span class="result-value" style="color: #667eea; font-size: 18px;">${callHim}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">他/她该叫我</span>
                    <span class="result-value" style="color: #764ba2; font-size: 18px;">${callMe}</span>
                </div>
                ${chainHtml}
                ${noteHtml}
            `;
            
            showToast(isSpecial ? '🎉 触发隐藏规则！' : isDefault ? '🔗 应用默认平辈规则' : '查询成功');
        }
        
        // 保存个人信息
        function savePersonal() {
            appData.personal = {
                name: document.getElementById('myName').value.trim(),
                gender: document.getElementById('myGender').value,
                city: document.getElementById('myCity').value.trim(),
                nickname: document.getElementById('myNickname').value.trim(),
                netName: document.getElementById('myNetName').value.trim()
            };
            saveData();
            showToast('个人信息已保存');
        }
        
        // ===== 辈分完善 - 动态关系人管理 =====
        const RELATION_OPTIONS = ['父亲', '母亲', '爷爷', '奶奶', '配偶'];
        let relCount = 0;
        
        function addRelationEntry(name, relation, otherRelation) {
            relCount++;
            const id = relCount;
            const isFirst = document.getElementById('relationList').children.length === 0;
            const div = document.createElement('div');
            div.className = 'person-card';
            div.id = `rel-${id}`;
            div.style.borderLeft = '4px solid #667eea';
            div.innerHTML = `
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                    <input type="text" id="relName${id}" placeholder="${isFirst ? '填的越多查得越快' : '你和想查询的人最可能有关系的是谁？'}" 
                        value="${name || ''}" 
                        style="flex:1;min-width:120px;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
                    <select id="relType${id}" onchange="toggleOtherInput(${id})" 
                        style="padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;min-width:80px;">
                        <option value="">和你的关系</option>
                        ${RELATION_OPTIONS.map(r => `<option value="${r}" ${relation === r ? 'selected' : ''}>${r}</option>`).join('')}
                        <option value="其他" ${relation === '其他' || (relation && !RELATION_OPTIONS.includes(relation)) ? 'selected' : ''}>其他</option>
                    </select>
                    <input type="text" id="relOther${id}" placeholder="输入关系" value="${(relation && !RELATION_OPTIONS.includes(relation)) ? relation : (otherRelation || '')}" 
                        style="display:${(relation === '其他' || (relation && !RELATION_OPTIONS.includes(relation))) ? 'inline-block' : 'none'};padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;min-width:80px;">
                    <button class="btn btn-danger" style="padding:8px 12px;font-size:12px;" onclick="removeRelEntry(${id})">✕</button>
                </div>
            `;
            document.getElementById('relationList').appendChild(div);
        }
        
        function toggleOtherInput(id) {
            const sel = document.getElementById(`relType${id}`);
            const other = document.getElementById(`relOther${id}`);
            other.style.display = sel.value === '其他' ? 'inline-block' : 'none';
            if (sel.value !== '其他') other.value = '';
        }
        
        function removeRelEntry(id) {
            const el = document.getElementById(`rel-${id}`);
            if (el) el.remove();
        }
        
        function collectRelations() {
            const relations = [];
            document.querySelectorAll('#relationList .person-card').forEach(card => {
                const id = card.id.replace('rel-', '');
                const name = document.getElementById(`relName${id}`)?.value.trim();
                const type = document.getElementById(`relType${id}`)?.value || '';
                const other = document.getElementById(`relOther${id}`)?.value.trim();
                if (name) {
                    relations.push({ 
                        name, 
                        relation: type === '其他' ? (other || '其他') : type
                    });
                }
            });
            return relations;
        }
        
        function saveRelations() {
            appData.relations = collectRelations();
            saveData();
            showToast('关系人信息已保存');
        }
        
        // 数据存储
        const LOCAL_KEY = 'familyRelations_local';
        
        // 显示登录/选择身份界面
        async function showLoginScreen() {
            const existing = document.getElementById('loginModal');
            if (existing) { existing.classList.add('show'); return; }
            
            // 获取已有用户列表
            const users = await listAllUsers();
            let userOptions = '';
            if (users.length > 0) {
                userOptions = '<div style="margin-top:16px;"><p style="font-size:13px;color:#666;margin-bottom:8px;">已有用户：</p>' +
                    users.map(u => `<button class="btn btn-secondary" style="margin:4px;" onclick="selectUser('${u}')">${u}</button>`).join('') +
                    '</div>';
            }
            
            const m = document.createElement('div');
            m.className = 'modal show';
            m.id = 'loginModal';
            m.style.display = 'flex';
            m.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header"><h3>👋 选择身份</h3></div>
                    <div class="modal-body">
                        <input type="text" id="loginName" placeholder="输入你的名字" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;" onkeydown="if(event.key==='Enter')selectUser()">
                        <button class="btn btn-primary" style="width:100%;margin-top:12px;" onclick="selectUser()">进入</button>
                        ${userOptions}
                    </div>
                </div>
            `;
            document.body.appendChild(m);
            
            // 如果之前有登录过，自动填充
            if (currentUserName) {
                document.getElementById('loginName').value = currentUserName;
            }
        }
        
        async function selectUser(name) {
            const userName = name || document.getElementById('loginName').value.trim();
            if (!userName) { showToast('请输入名字'); return; }
            
            currentUserName = userName;
            localStorage.setItem('poi_currentUser', userName);
            
            // 关闭登录弹窗
            const modal = document.getElementById('loginModal');
            if (modal) modal.remove();
            
            // 从 GitHub 加载数据
            const data = await loadFromGitHub(userName);
            if (data) {
                appData = data;
            } else {
                // 新用户，检查本地是否有数据
                const localData = localStorage.getItem(LOCAL_KEY);
                if (localData) {
                    appData = JSON.parse(localData);
                }
            }
            
            loadDataToForm();
            updateDataPreview();
            updatePersonGrid();
            // 更新头部用户显示
            const headerUser = document.getElementById('headerUser');
            if (headerUser) headerUser.textContent = `| 👤 ${userName}`;
            showToast(`欢迎，${userName}！`);
        }
        
        // 切换用户
        async function switchUser() {
            showLoginScreen();
        }
        
        function saveData() {
            // 保存到本地
            localStorage.setItem(LOCAL_KEY, JSON.stringify(appData));
            // 保存到 GitHub
            if (currentUserName) {
                saveToGitHub(currentUserName, appData);
            }
            updateDataPreview();
            updatePersonGrid();
        }
        
        // 从本地加载数据（无网络回退）
        function loadDataFromLocal() {
            const localData = localStorage.getItem(LOCAL_KEY);
            if (localData) {
                appData = JSON.parse(localData);
            }
            loadDataToForm();
        }
        
        // 将 appData 填充到表单
        function loadDataToForm() {
            if (appData.personal) {
                document.getElementById('myName').value = appData.personal.name || '';
                document.getElementById('myGender').value = appData.personal.gender || '';
                document.getElementById('myCity').value = appData.personal.city || '';
                document.getElementById('myNickname').value = appData.personal.nickname || '';
                document.getElementById('myNetName').value = appData.personal.netName || '';
            }
            // 加载关系人
            const rels = appData.relations;
            if (Array.isArray(rels) && rels.length > 0) {
                rels.forEach(r => {
                    if (r && r.name) {
                        addRelationEntry(r.name, r.relation, r.relation === '其他' ? r.relation : '');
                    }
                });
            } else if (typeof rels === 'object' && rels) {
                Object.values(rels).forEach(r => {
                    if (r && r.name) addRelationEntry(r.name, r.relation || '');
                });
            }
            if (document.getElementById('relationList').children.length === 0) {
                addRelationEntry();
            }
        }
        
        // 导出数据
        function exportData() {
            const dataStr = JSON.stringify(appData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `family-relations-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('数据已导出');
        }
        
        // 导入数据
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    appData = JSON.parse(e.target.result);
                    saveData();
                    loadData();
                    showToast('数据导入成功');
                } catch (err) {
                    showToast('导入失败：文件格式错误');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
        
        // 清空数据
        function clearData() {
            if (confirm('确定要清空所有数据吗？此操作不可恢复！')) {
                localStorage.removeItem(LOCAL_KEY);
                appData = { personal: {}, relations: {}, children: [] };
                if (currentUserName) {
                    saveToGitHub(currentUserName, appData);
                }
                location.reload();
            }
        }
        
        // 更新数据预览
        function updateDataPreview() {
            // 数据预览已移除，仅保留缓存更新
        }
        
        // ========== GitHub 多用户存储 ==========
        const REPO = 'leaffloat/poi';
        const GITHUB_API = 'https://api.github.com';
        const JSDELIVR = 'https://cdn.jsdelivr.net/gh';
        const TOKEN_KEY = 'poi_github_token';
        let allUsersCache = {};
        
        // 默认密钥（拆分混淆，避免 GitHub 扫描）
        const _dk = ['ghp_K9zU','AXJIdBlom7','AiGZTHR7cb','Hndcyl09Ct9I'].join('');
        
        // 获取 token
        function getToken() {
            return localStorage.getItem(TOKEN_KEY) || _dk;
        }
        
        // GitHub API 请求
        async function githubAPI(path, method, body) {
            const token = getToken();
            const headers = {
                'Content-Type': 'application/json',
                'User-Agent': 'poi-app'
            };
            if (token) headers['Authorization'] = 'token ' + token;
            const opts = { method, headers };
            if (body) opts.body = JSON.stringify(body);
            const resp = await fetch(GITHUB_API + path, opts);
            return resp;
        }
        
        // 从 GitHub 读取用户数据
        async function loadFromGitHub(userName) {
            try {
                // 先试 jsDelivr（快，但有缓存）
                const url = `${JSDELIVR}/${REPO}@main/data/${encodeURIComponent(userName)}.json`;
                const resp = await fetch(url + '?t=' + Date.now());
                if (resp.ok) {
                    return await resp.json();
                }
            } catch(e) {
                console.warn('jsDelivr read failed, trying API:', e);
            }
            
            // 回退到 GitHub API（实时，但有速率限制）
            try {
                const resp = await githubAPI(`/repos/${REPO}/contents/data/${encodeURIComponent(userName)}.json`);
                if (resp.ok) {
                    const data = await resp.json();
                    const content = atob(data.content.replace(/\n/g, ''));
                    return JSON.parse(decodeURIComponent(escape(content)));
                }
            } catch(e) {
                console.warn('GitHub API read failed:', e);
            }
            return null;
        }
        
        // 保存用户数据到 GitHub
        async function saveToGitHub(userName, data) {
            const token = getToken();
            if (!token) {
                showToast('请先设置写入密钥');
                showTokenModal();
                return false;
            }
            
            const filePath = `data/${encodeURIComponent(userName)}.json`;
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
            
            try {
                // 获取当前文件的 SHA（如果存在）
                let sha = null;
                const checkResp = await githubAPI(`/repos/${REPO}/contents/${filePath}`);
                if (checkResp.ok) {
                    const fileInfo = await checkResp.json();
                    sha = fileInfo.sha;
                }
                
                // 创建或更新文件
                const body = {
                    message: `更新 ${userName} 的数据`,
                    content: content
                };
                if (sha) body.sha = sha;
                
                const resp = await githubAPI(`/repos/${REPO}/contents/${filePath}`, 'PUT', body);
                if (resp.ok) {
                    // 更新用户列表
                    await updateUserIndex(userName);
                    return true;
                } else {
                    const err = await resp.json();
                    console.error('Save failed:', err);
                    showToast('保存失败: ' + (err.message || '未知错误'));
                    return false;
                }
            } catch(e) {
                console.error('Save error:', e);
                showToast('保存失败: ' + e.message);
                return false;
            }
        }
        
        // 更新用户索引
        async function updateUserIndex(userName) {
            const token = getToken();
            if (!token) return;
            
            try {
                let indexData = { users: [] };
                let sha = null;
                
                const checkResp = await githubAPI(`/repos/${REPO}/contents/data/index.json`);
                if (checkResp.ok) {
                    const fileInfo = await checkResp.json();
                    sha = fileInfo.sha;
                    const content = atob(fileInfo.content.replace(/\n/g, ''));
                    indexData = JSON.parse(decodeURIComponent(escape(content)));
                }
                
                if (!indexData.users.includes(userName)) {
                    indexData.users.push(userName);
                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(indexData, null, 2))));
                    const body = { message: '更新用户列表', content: content };
                    if (sha) body.sha = sha;
                    await githubAPI(`/repos/${REPO}/contents/data/index.json`, 'PUT', body);
                }
            } catch(e) {
                console.warn('Update index failed:', e);
            }
        }
        
        // 获取所有用户列表
        async function listAllUsers() {
            try {
                // 先试 jsDelivr
                const url = `${JSDELIVR}/${REPO}@main/data/index.json`;
                const resp = await fetch(url + '?t=' + Date.now());
                if (resp.ok) {
                    const data = await resp.json();
                    allUsersCache = {};
                    // 异步加载每个用户的个人数据（仅名字和性别）
                    if (data.users) {
                        for (const name of data.users) {
                            allUsersCache[name] = { personal: { name } };
                        }
                    }
                    return data.users || [];
                }
            } catch(e) {
                console.warn('jsDelivr index failed:', e);
            }
            
            // 回退到 GitHub API
            try {
                const resp = await githubAPI(`/repos/${REPO}/contents/data`);
                if (resp.ok) {
                    const files = await resp.json();
                    const users = files
                        .filter(f => f.name !== 'index.json' && f.name.endsWith('.json'))
                        .map(f => f.name.replace('.json', ''));
                    allUsersCache = {};
                    users.forEach(u => { allUsersCache[u] = { personal: { name: u } }; });
                    return users;
                }
            } catch(e) {
                console.warn('GitHub API list failed:', e);
            }
            return [];
        }
        
        // 加载其他用户数据（用于跨用户查询）
        async function loadOtherUserData(userName) {
            if (allUsersCache[userName] && allUsersCache[userName].personal && allUsersCache[userName].personal.gender) {
                return allUsersCache[userName]; // 已缓存完整数据
            }
            const data = await loadFromGitHub(userName);
            if (data) {
                allUsersCache[userName] = data;
            }
            return data;
        }
        
        // 设置密钥弹窗
        function showTokenModal() {
            const modal = document.getElementById('tokenModal');
            if (!modal) {
                const m = document.createElement('div');
                m.className = 'modal';
                m.id = 'tokenModal';
                m.innerHTML = `
                    <div class="modal-content">
                        <div class="modal-header"><h3>⚙️ 设置写入密钥</h3></div>
                        <div class="modal-body">
                            <p style="margin-bottom:12px;color:#666;font-size:13px;">需要 GitHub Personal Access Token 才能保存数据到云端。</p>
                            <p style="margin-bottom:12px;color:#666;font-size:13px;">找群主要一个就行，输入一次以后就不用再输了。</p>
                            <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxx" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;">
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="document.getElementById('tokenModal').classList.remove('show')">取消</button>
                            <button class="btn btn-primary" onclick="saveToken()">保存</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(m);
            }
            document.getElementById('tokenInput').value = getToken();
            document.getElementById('tokenModal').classList.add('show');
        }
        
        function saveToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (token) {
                localStorage.setItem(TOKEN_KEY, token);
                document.getElementById('tokenModal').classList.remove('show');
                showToast('密钥已保存');
            }
        }
        
        // 提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
